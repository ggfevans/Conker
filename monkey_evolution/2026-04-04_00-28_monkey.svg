        <stop offset="100%" stop-color="#1A0033"/>
    </radialGradient>
    <linearGradient id="holo-body" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FF00FF"/><stop offset="50%" stop-color="#00FFFF"/>
        <stop offset="100%" stop-color="#FFFF00"/>
